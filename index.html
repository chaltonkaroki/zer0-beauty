<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zer0 Lashes & Nails | Book Your Service</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="hero">
    <h1>Book Your Beauty Service</h1>
</header>

<main class="container">

    <!-- Payment Information -->
    <div class="payment-card">
        <div class="payment-item">
            <span class="icon">🏦</span>

            <div>
                <strong>Equity Bank Paybill</strong>
                <p class="number">247247</p>
                <small>Account No: 0790184581455</small>
            </div>
        </div>
    </div>

    <!-- Booking Form -->
    <form id="bookingForm" name="submit-to-google-sheet">

        <div class="form-group">
            <label for="name">Name</label>

            <input
                type="text"
                id="name"
                name="Name"
                placeholder="Enter your name"
                required>
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>

            <input
                type="tel"
                id="phone"
                name="Phone"
                placeholder="07XXXXXXXX"
                pattern="[0-9]{10}"
                required>
        </div>

        <div class="form-group">
            <label for="service">Service</label>

            <select id="service" name="Service" required>
                <option value="" selected disabled>Select a service</option>
                <option value="Eyelashing">Eyelashing</option>
                <option value="Eyebrow Painting">Eyebrow Painting</option>
                <option value="Manicure">Manicure</option>
                <option value="Pedicure">Pedicure</option>
            </select>
        </div>

        <button type="submit">Submit Booking</button>

        <p id="msg"></p>

    </form>

</main>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyFP57wMBm34vgKcFLeSyl0enNvWoU7H5_pHGQPYpWrOAfV9S646L0KyshLa_2lM65ZMw/exec";

const form = document.getElementById("bookingForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    msg.style.color = "#6a1b9a";
    msg.textContent = "Sending booking...";

    try {

        const response = await fetch(scriptURL, {
            method: "POST",
            body: new FormData(form)
        });

        if (!response.ok) {
            throw new Error("Server returned an error.");
        }

        msg.style.color = "green";
        msg.textContent = "✅ Booking submitted successfully! We will contact you shortly.";

        form.reset();

        setTimeout(() => {
            msg.textContent = "";
        }, 5000);

    } catch (error) {

        console.error(error);

        msg.style.color = "red";
        msg.textContent = "❌ Unable to submit booking. Please try again or contact us via WhatsApp.";

    }

});
</script>

</body>
</html>
