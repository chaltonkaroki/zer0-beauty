<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zer0 Lashes & Nails | Book Your Service</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero">
        <h1>Book Your Beauty Service</h1>
    </header>

    <main class="container">
        <!-- Payment Info Card -->
               <!-- Payment Info Card -->
        <div class="payment-card" style="justify-content: center;">
            <div class="payment-item">
                <span class="icon">🏦</span>
                <div>
                    <strong>Equity Bank Paybill:</strong>
                    <p class="number">247247</p>
                    <small style="color:#666; font-size:0.8rem;">Account No: 0790184581455</small>
                </div>
            </div>
        </div>

        <!-- Booking Form -->
                <!-- Booking Form -->
        <form class="booking-form" name="submit-to-google-sheet">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="Name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="Phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>Service</label>
                <select name="Service" required>
                    <option value="" disabled selected>Select a service</option>
                    <option value="Eyelashing">Eyelashing</option>
                    <option value="Eyebrows">Eyebrow Painting</option>
                    <option value="Manicure">Manicure</option>
                    <option value="Pedicure">Pedicure</option>
                </select>
            </div>

            <div class="form-group">
                <label>Transaction Code</label>
                <input type="text" name="Transaction Code" placeholder="Enter M-Pesa/Airtel confirmation code" required>
            </div>

            <button type="submit">Submit Booking</button>
            <p id="msg" style="text-align:center; margin-top:10px; color:#6a1b9a; font-weight:bold;"></p>
        </form>
    </main>

       <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyFP57wMBm34vgKcFLeSyl0enNvWoU7H5_pHGQPYpWrOAfV9S646L0KyshLa_2lM65ZMw/exec'
        const form = document.forms['submit-to-google-sheet']
        const msg = document.getElementById("msg")

        form.addEventListener('submit', e => {
          e.preventDefault()
          msg.innerHTML = " Sending booking..."
          
          fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.innerHTML = "✅ Booking Confirmed! We'll contact you soon."
                form.reset()
                setTimeout(() => msg.innerHTML = "", 5000)
            })
            .catch(error => {
                msg.innerHTML = "❌ Error! Please try again or WhatsApp us."
                console.error('Error!', error.message)
            })
        })
    </script>
</body>
</html>
