<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zer0 Lashes & Nails | Book Your Service</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero">
        <h1>Book Your Beauty Service</h1>
    </header>

    <main class="container">
        <!-- Payment Info Card -->
        <div class="payment-card" style="justify-content: center;">
            <div class="payment-item">
                <span class="icon"></span>
                <div>
                    <strong>Equity Bank Paybill:</strong>
                    <p class="number">247247</p>
                    <small style="color:#666; font-size:0.8rem;">Account No: 0790184581455</small>
                </div>
            </div>
        </div>

        <!-- Live Queue Status Section -->
        <div class="queue-status-card">
            <div class="queue-header">
                <span class="pulse-dot"></span>
                <h3>Live Service Status</h3>
            </div>
            
            <div class="queue-grid">
                <div class="queue-item">
                    <span class="label">Currently Serving:</span>
                    <span class="value" id="current-service">Eyelashing</span>
                </div>
                <div class="queue-item">
                    <span class="label">Next in Line:</span>
                    <span class="value" id="next-service">Manicure</span>
                </div>
                <div class="queue-item highlight">
                    <span class="label">Est. Wait Time:</span>
                    <span class="value" id="wait-time">~45 mins</span>
                </div>
            </div>
            <p class="queue-note">*Updated in real-time from our booking system</p>
        </div>

        <!-- Who's Waiting List -->
        <div class="queue-list-card">
            <h3>👥 Currently Waiting</h3>
            <ul id="waiting-list" class="waiting-list">
                <li class="loading-item">Loading live queue...</li>
            </ul>
        </div>

        <!-- Booking Form -->
        <form class="booking-form" name="submit-to-google-sheet">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="Name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="Phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>Service</label>
                <select name="Service" required>
                    <option value="" disabled selected>Select a service</option>
                    <option value="Eyelashing">Eyelashing</option>
                    <option value="Eyebrows">Eyebrow Painting</option>
                    <option value="Manicure">Manicure</option>
                    <option value="Pedicure">Pedicure</option>
                </select>
            </div>

            <button type="submit">Submit Booking</button>
            <p id="msg" style="text-align:center; margin-top:10px; color:#6a1b9a; font-weight:bold;"></p>
        </form>
    </main>

    <script>
        // YOUR NEW DEPLOYMENT URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxsGFeNu7j3znv_IhmkvCDb5NPTBriVAeHVbXBxkSv3MqCzlqaVqKwJtEPcXnUlwxjDaA/exec'
        
        const form = document.forms['submit-to-google-sheet']
        const msg = document.getElementById("msg")

        // Handle Form Submission
        form.addEventListener('submit', e => {
            e.preventDefault()
            msg.innerHTML = " Sending booking..."
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    msg.innerHTML = "✅ Booking Confirmed! We'll contact you soon."
                    form.reset()
                    setTimeout(() => msg.innerHTML = "", 5000)
                    loadQueue(); // Refresh queue immediately after booking
                })
                .catch(error => {
                    msg.innerHTML = "❌ Error! Please try again or WhatsApp us."
                    console.error('Error!', error.message)
                })
        })

        // Load Waiting List Function
        function loadQueue() {
            const listEl = document.getElementById('waiting-list');
            listEl.innerHTML = '<li class="loading-item">Updating queue...</li>';
            
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    if (!data || data.length === 0) {
                        listEl.innerHTML = '<li class="empty-item">No one is currently waiting! 🎉</li>';
                    } else {
                        listEl.innerHTML = data.map(person => 
                            `<li><span class="person-name">${person.name}</span> <span class="person-service">→ ${person.service}</span></li>`
                        ).join('');
                    }
                })
                .catch(err => {
                    console.error('Queue fetch error:', err);
                    listEl.innerHTML = '<li class="error-item">Unable to load queue.</li>';
                });
        }

        // Initial Load & Auto-Refresh every 60 seconds
        loadQueue();
        setInterval(loadQueue, 60000);
    </script>
</body>
</html>
